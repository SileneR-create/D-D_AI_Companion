# Pipeline CI/CD complète, en un seul job :
#   1. vérifie le backend (compilation)
#   2. build le frontend (Vite)
#   3. build les images Docker (backend + frontend)
#   4. (sur main/master uniquement) publie les images sur GitHub Container Registry
name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  ci-cd:
    name: Build · Test · Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # nécessaire pour pousser sur ghcr.io
    steps:
      # --- Récupération du code ---
      - uses: actions/checkout@v4

      # --- Backend : vérification de syntaxe (sans installer les lourdes deps ML) ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile backend
        run: python -m compileall -q backend

      # --- Frontend : build de production ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund
          npm run build

      # --- Docker : préparation ---
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # On ne se connecte/publie que sur push vers la branche principale.
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Noms d'images en minuscules
        id: img
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # --- Build (et push si push sur main) de l'image backend ---
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.img.outputs.repo }}-backend:latest
            ghcr.io/${{ steps.img.outputs.repo }}-backend:${{ github.sha }}

      # --- Build (et push si push sur main) de l'image frontend ---
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.img.outputs.repo }}-frontend:latest
            ghcr.io/${{ steps.img.outputs.repo }}-frontend:${{ github.sha }}
