server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy de l'API vers le backend (meme origine cote navigateur -> pas de CORS).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Streaming SSE : pas de mise en tampon, pas de timeout court.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA : toute autre route renvoie index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
